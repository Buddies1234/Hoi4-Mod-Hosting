l_russian: 
  political_sphere:0 "Внутренняя политика"
  political_sphere_desc:0 "Чтобы изменить мир, нужно сначала поменять ситуацию дома"
  radicalism_focus:0 "Радикальные меры"
  radicalism_focus_desc:0 "Сдержаность не даст нашей нации ответы которые требуются. Лишь радикальные решения помогут нашей стране."
  moderate_focus:0 "Cила в сдержанности"
  moderate_focus_desc:0 "It is all too easy to succumb to the easy answers of radical politics. Moderation is our strength, and we will stick with it."
  sickle_sword_focus:0 "Серп и молот"
  sickle_sword_focus_desc:0 "Серп и молот могут оказаться недостаточными для построения коммунистического общества, рабочим, потребуется вооружиться не только серпом, но и молотом..”
  communist_regime_focus:0 "Коммунистический режим"
  communist_regime_focus_desc:0 "Мы достигли коммунизма - первый шаг к свободе."
  iron_blood_focus:0 "Сталь и кровь"
  iron_blood_focus_desc:0 "Для укрепления нации мы должны построить сильное общество, основанное на железе и крови."
  fascist_regime_focus:0 "Фашисткий режим"
  fascist_regime_focus_desc:0 "Националистическое правительство установлено, и теперь наши планы относительно мира могут быть реализованы."
  power_people_focus:0 "Сила людям"
  power_people_focus_desc:0 "Только благодаря голосованию народа мы можем иметь легитимное и нравственное правительство."
  socialism_dem_focus:0 "Социальная Демократия"
  socialism_dem_focus_desc:0 "Социальная демократия является идеологией [ROOT.GetDemocraticLeader] и мы будем формировать общество в соответствии с их идеалами."
  liberalism_focus:0 "Либеральная демократия"
  liberalism_focus_desc:0 "Либерализм является идеологией [ROOT.GetDemocraticLeader] и мы будем формировать общество в соответствии с их идеалами."
  conservatism_focus:0 "Консервативная демократия"
  conservatism_focus_desc:0 "Консерватизм является идеологией [ROOT.GetDemocraticLeader] и мы будем формировать общество в соответствии с их идеалами."
  maintain_regime_focus:0 "Отвергнуть Идеологию"
  maintain_regime_focus_desc:0 "Нашей нации лучше не принимать чью-либо сторону, поэтому мы должны сохранить нынешний режим."
  change_regime_focus:0 "Изменения режима"
  change_regime_focus_desc:0 "Нынешнее правительство не отвечает нашим интересам, мы должны приложить усилия, чтобы сорвать его планы."
  propaganda_effort_focus:0 "Идеологическая пропаганда"
  propaganda_effort_focus_desc:0 "Для того чтобы укрепить веру народа в режим, мы должны максимально укрепить нашу идеологию."
  seized_industry_focus:0 "Государственная конфискация промышленности"
  seized_industry_focus_desc:0 "Частная промышленность должна подчиняться воле государства, в противном случае ее активы будут конфискованы."
  seized_industry_focus_2:0 "Планированая економика"
  seized_industry_focus_2_desc:0 "Только государство, а не частный бизнес, может по-настоящему понять, в чем должны заключаться наши приоритеты в промышленной сфере."
  secret_police_focus:0 "Разширение секретной полиции"
  secret_police_focus_desc:0 "Секретная полиция будет играть важную роль в предотвращении антипартийной деятельности любых диссидентов."
  political_correct_focus:0 "Политическое право"
  political_correct_focus_desc:0 "Люди, придерживающиеся слегка спорных или иным образом вызывающих смущение взглядов, похоже, обеспокоены тем, что против них ведется масштабный заговор. Это кажется отличной идеей."
  class_struggle_focus:0 "Классовая борьба"
  class_struggle_focus_desc:0 "Слишком долго буржуазные капиталисты попирали права рабочего класса. Но сегодня этому придет конец!"
  worker_republic_focus:0 "Рабочая страна"
  worker_republic_focus_desc:0 "Провозгласив рабочую республику, наша страна будет действовать с гораздо большим рвением к прогрессу."
  dispel_the_past_focus:0 "Уничтожение прошлого"
  dispel_the_past_focus_desc:0 "Для достижение будущего, нужно забыть прошлое"
  embodied_revolution_focus:0 "Революция за границей"
  embodied_revolution_focus_desc:0 "Мы-революция, а революция не знает границ!"
  collectivisation_focus:0 "Коллективизация"
  collectivisation_focus_desc:0 "Чтобы предотвратить захват индустрии капиталистическими свиньями мы должны ее коллективизировать."
  state_planning_body_focus:0 "Государственные органы планирования"
  state_planning_body_focus_desc:0 "Создание государственных органов для планирования будущего экономического и социального развития будет способствовать улучшению нашего управления."
  tow_the_moscow_line_focus:0 "Следовать по линии"
  tow_the_moscow_line_focus_desc:0 "Москва понимает что единственный путь к коммунизму - следовать за ней!"
  commissars_unleashed_focus:0 "Освобождение коммисаров"
  commissars_unleashed_focus_desc:0 "Назначение политических деятелей в армию позволит нам усилить контроль над вооруженными силами и вселит страх в гражданское население."
  ruthless_industrialisation_focus:0 "Радикальная индурстриализация"
  ruthless_industrialisation_focus_desc:0 "Если мы хотим не отставать от великих держав мира, нам необходимо любой ценой провести индустриализацию."
  proletarian_state_almighty_focus:0 "Пролетарское государство"
  proletarian_state_almighty_focus_desc:0 "Ленин, Троцкий, Сталин. Эти люди понимали, что власть должна исходить из центра, и сильное правительство будет держать страну в узде."
  independant_communism_focus:0 "Независимый Коммунизм"
  independant_communism_focus_desc:0 "Москва не обладает монополией на социалистическую мысль. Мы пойдем своим путем, по идеалам [ROOT.GetCommunistLeader]."
  autonomous_trade_unions_focus:0 "Независимые профсоюзы"
  autonomous_trade_unions_focus_desc:0 "Предоставление большей власти профсоюзам, работающим в сотрудничестве с государством, позволит оптимизировать нашу экономику и одновременно защитить права трудящихся."
  empowered_militias_focus:0 "Расширенные полномочия ополченцев"
  empowered_militias_focus_desc:0 "Нельзя ожидать, что армия будет защищать интересы всей нации. Местные ополчения должны быть уполномочены поддерживать порядок среди населения."
  communist_councils_focus:0 "Федеральная република рабочих"
  communist_councils_focus_desc:0 "Хотя федеральное правительство играет ведущую роль, именно сотрудничество между нашими штатами позволяет нашей стране достичь величия."
  spread_communism_focus:0 "Разширение коммунистической идеологии"
 spread_communism_focus_desc:0 "Распространение нашей идеологии среди соседей поможет нам обрести надёжных союзников за рубежом."
  peoples_army_focus:0 "Народная армия"
  peoples_army_focus_desc:0 "Если мы хотим нести коммунизм в мир, мы должны быть готовы подкрепить его силой."
  communist_marching_focus:0 "Идеологическая борьба"
  communist_marching_focus_desc:0 "Наша идеология ведёт наших солдат вперёд — вера в равенство и коммунизм станет нашим щитом!"
  true_revolutionaries_focus:0 "Вестники революции"
  true_revolutionaries_focus_desc:0 "Мы — истинные наследники Маркса! Мы являем собой образец коммунизма и принесём революцию всему миру!"
  instil_nationalism_focus:0 "Воспитание национализма"
  instil_nationalism_focus_desc:0 "Сильное чувство национального единства необходимо для реализации наших экспансионистских амбиций."
  control_youth_focus:0 "Контроль над молодёжью"
  control_youth_focus_desc:0 "Идеологическая обработка молодёжи в рамках фашистских организаций значительно усилит наш военный потенциал."
  enforced_loyalty_focus:0 "Принудительная партийная лояльность"
  enforced_loyalty_focus_desc:0 "Каждый гражданин должен подчиняться воле партии. Обязательное членство укрепит её позиции."
  corporatism_focus:0 "Корпоратизм"
  corporatism_focus_desc:0 "Назначение государственных представителей в корпорации позволит подчинить их интересы нуждам государства."
  national_fanatic_focus:0 "Идеологический фанатизм"
  national_fanatic_focus_desc:0 "[ROOT.GetFascistLeader] искренне верит в фашизм как средство возвышения нации. Ничто не поколеблет его убеждений."
  pragamtic_ideologue_focus:0 "Прагматичный тоталитаризм"
  pragamtic_ideologue_focus_desc:0 "[ROOT.GetFascistLeader] придерживается фашистских взглядов, но готов идти на компромиссы ради практической выгоды."
  claim_nearby_focus:0 "Претензии на соседние территории"
  claim_nearby_focus_desc:0 "Наши соседи слабы и владеют нашими исконными землями. Мы должны вернуть их."
  сareful_alliances_focus:0 "Осторожная дипломатия"
  careful_alliances_focus_desc:0 "Мы можем подчинить соседние страны своему влиянию и использовать их в наших интересах."
  desires_for_empire_focus:0 "Милитаризация государства"
  desires_for_empire_focus_desc:0 "Сильная армия — основа нашей идеологии, как для поддержания порядка внутри страны, так и для продвижения интересов за её пределами."
  call_to_war_industry_focus:0 "Мобилизация на войну"
  call_to_war_industry_focus_desc:0 "Война была неизбежна. Народ должен принять её как судьбу."
  total_war_industry_focus:0 "Военная экономика"
  total_war_industry_focus_desc:0 "Вся промышленность должна быть переориентирована на производство вооружений."
  masters_over_all_focus:0 "Господство над миром"
  masters_over_all_focus_desc:0 "Фашизм привёл нашу нацию к величию — теперь мы готовы подчинить себе весь мир!"
  church_fiat_focus:0 "Подчинение церкви"
  church_fiat_focus_desc:0 "Церковь должна служить государству и узаконить наш режим."
  replace_church_focus:0 "Государство вместо церкви"
  replace_church_focus_desc:0 "Церковь устарела и бесполезна. Нет богов — есть только люди!"
  paramilitary_focus:0 "Парамилитаризм"
  paramilitary_focus_desc:0 "Военные принципы применимы и в гражданской жизни. Полувоенные формирования повысят подготовку населения."   
  brutal_oppression_focus:0 "Жёсткое подавление"
  brutal_oppression_focus_desc:0 "Те, кто не подчиняется или не принадлежит к нашей нации, должны служить ей, если хотят выжить."
  autarky_focus:0 "Автаркия"
  autarky_focus_desc:0 "Только экономическая самодостаточность позволит нам вести войну, не опасаясь внешнего давления."
  increased_welfare_focus:0 "Расширение социальной поддержки"
  increased_welfare_focus_desc:0 "Даже ограниченные ресурсы позволяют нам поддержать наиболее нуждающихся."
  state_involvement_economy_focus:0 "Государственное регулирование"
  state_involvement_economy_focus_desc:0 "Государство должно вмешиваться, когда капитал угрожает стабильности. Рабочие нуждаются в защите."
  widen_suffrage_focus:0 "Расширение избирательных прав"
  widen_suffrage_focus_desc:0 "Предоставление права голоса всем слоям населения укрепит легитимность власти."
  democratic_progress_focus:0 "Равенство"
  democratic_progress_focus_desc:0 "Несправедливость в одном месте угрожает справедливости повсюду."
  individual_freedom_focus:0 "Личная свобода"
  individual_freedom_focus_desc:0 "Свобода даёт людям возможность жить независимо и уверенно."
  laissez_faire_economics_focus:0 "Свободный рынок"
  laissez_faire_economics_focus_desc:0 "Экономика должна развиваться без вмешательства государства."
  democratic_freedom_focus:0 "Меритократия"
  democratic_freedom_focus_desc:0 "Людей следует оценивать по их достижениям, а не по происхождению."
  maintain_traditional_values_focus:0 "Традиционные ценности"
  maintain_traditional_values_focus_desc:0 "Традиции объединяют нацию и обеспечивают стабильность."
  state_prudence_focus:0 "Государственная рассудительность"
  state_prudence_focus_desc:0 "Мы должны управлять страной с осторожностью и дальновидностью."
  democratic_stability_focus:0 "Реализм"
  democratic_stability_focus_desc:0 "Отсутствие реализма сегодня подрывает доверие завтра."
  enshrined_constitution_focus:0 "Закрепление конституции"
  enshrined_constitution_focus_desc:0 "Прочная конституция защитит нашу демократию от радикалов."
  electoral_legitimacy_focus:0 "Легитимность власти"
  electoral_legitimacy_focus_desc:0 "Свободные выборы укрепляют положение государства на мировой арене."
  global_involvement_focus:0 "Глобальное участие"
  global_involvement_focus_desc:0 "Мир стал опаснее — мы должны быть готовы защищать права человека."
  volunteer_companies_focus:0 "Добровольческие формирования"
  volunteer_companies_focus_desc:0 "Они позволяют нам влиять на события за рубежом и получать боевой опыт."
  democratic_diplomacy_focus:0 "Демократическая дипломатия"
  democratic_diplomacy_focus_desc:0 "Мы должны поддерживать демократические страны по всему миру."   
  active_participation_focus:0 "Глобальная безопасность"
  active_participation_focus_desc:0 "Мы должны быть готовы противостоять тирании в любой точке мира."
  make_the_case_for_war_focus:0 "Обоснование войны"
  make_the_case_for_war_focus_desc:0 "Народ должен понимать необходимость войны и быть готов к её последствиям."
  war_sciences_institute_focus:0 "Военно-научный институт"
  war_sciences_institute_focus_desc:0 "Война ускоряет научный прогресс — мы должны использовать это."
  will_of_people_focus:0 "Воля народа"
  will_of_people_focus_desc:0 "Демократия принесла нашим гражданам свободу, безопасность и достоинство."
  moderate_politics_focus:0 "Нейтральная демократия"
  moderate_politics_focus_desc:0 "Мы демократичны, но не привязаны к конкретной идеологии."
  balance_internal_politics_focus:0 "Баланс внутренней политики"
  balance_internal_politics_focus_desc:0 "Необходимо сохранять равновесие между политическими силами." 
  ideological_redoubt_focus:0 "Укрепление режима"
  ideological_redoubt_focus_desc:0 "Нейтралитет требует особой защиты от внешнего влияния."
  despotism_focus:0 "Авторитарное государство"
  despotism_focus_desc:0 "Мы диктатура, но не связаны с идеологиями фашизма или коммунизма."
  unconventional_ideology_focus:0 "Идеологическая гибкость"
  unconventional_ideology_focus_desc:0 "Мы не ограничены идеологическими рамками и можем действовать свободно."
  political_maneuvres_focus:0 "Политические манёвры"
  political_maneuvres_focus_desc:0 "Мы должны действовать осторожно на мировой арене."
  ideological_democracy_focus:0 "Переход к идеологической демократии"
  ideological_democracy_focus_desc:0 "Нейтралитет становится опасным — нам необходимо определиться."
  stay_course_focus:0 "Сохранение курса"
  stay_course_focus_desc:0 "Наша гибкость — наша сила, и мы не должны её терять."
  crush_dissenters_focus:0 "Подавление инакомыслия"
  crush_dissenters_focus_desc:0 "Любое сопротивление должно быть уничтожено."
  authoritarian_focus:0 "Военное положение"
  authoritarian_focus_desc:0 "Стабильность поддерживается силой армии."
  absolute_power_focus:0 "Абсолютная власть"
  absolute_power_focus_desc:0 "Государство должно быть всесильным. Государство — это мы!"
  neutrality_defence_focus:0 "Оборона нейтралитета"
  neutrality_defence_focus_desc:0 "Нейтралитет даст нам время подготовиться."
  staff_planning_office_focus:0 "Штабное планирование"
  staff_planning_office_focus_desc:0 "Профессионализм важнее политической лояльности."
  arms_dealing_focus:0 "Экспорт вооружений"
  arms_dealing_focus_desc:0 "Мы можем продавать излишки вооружения, не участвуя в войне."
  deterrence_power_focus:0 "Сдерживание"
  deterrence_power_focus_desc:0 "Лучшая защита — та, которую не приходится применять."
  entrenchment_crews_focus:0 "Инженерные части"
  entrenchment_crews_focus_desc:0 "Они играют ключевую роль в обороне."
  abandon_neutrality_focus:0 "Отказ от нейтралитета"
  abandon_neutrality_focus_desc:0 "Нейтралитет больше не обеспечивает безопасность."
  plan_for_worst_focus:0 "Подготовка к худшему"
  plan_for_worst_focus_desc:0 "Война неизбежна — мы должны быть готовы."
  fortification_focus:0 "Фортификационные работы"
  fortification_focus_desc:0 "Форты, пожалуй, являются важнейшей частью оборонительной войны. Мы должны построить их как можно больше, чтобы защитить ключевые позиции."
  improved_training_focus:0 "Улучшенная подготовка армии"
  improved_training_focus_desc:0 "У нас есть возможность вложиться в подготовку армии. Если мы хотим быть готовы, превосходная выучка станет большим преимуществом."
  ramp_up_production_focus:0 "Наращивание военного производства"
  ramp_up_production_focus_desc:0 "Мы должны увеличить выпуск вооружений, чтобы каждый солдат был обеспечен оружием."
  armed_ready_focus:0 "Вооружены и готовы"
  armed_ready_focus_desc:0 "Мы можем завершить подготовку и закрепить промышленные преобразования. Если кто-то решит испытать нас, мы будем готовы."
  our_mark_world_focus:0 "Власть [ROOT.GetNeutralLeader]"
  our_mark_world_focus_desc:0 "Мы не можем позволить себе изоляцию и замкнутость. Пришло время выйти на мировую арену и оставить на ней свой след!"
  instill_martiality_focus:0 "Усиление роли армии"
  instill_martiality_focus_desc:0 "Армия должна играть роль большую, чем просто военная полиция. Она является хранителем режима."
  transform_war_state_focus:0 "Подготовка к состоянию войны"
  transform_war_state_focus_desc:0 "Чтобы участвовать в мировых делах, мы должны быть готовы к войне."
  claims_abroad_focus:0 "Зарубежные претензии"
  claims_abroad_focus_desc:0 "Рядом с нами есть территории, на которые мы можем обоснованно претендовать. Пора заявить о своих правах!"
  dictatorial_powers_focus:0 "Полномочия [ROOT.GetNeutralLeader]"
  dictatorial_powers_focus_desc:0 "[ROOT.GetNeutralLeader] обладает огромной властью, авторитетом и влиянием внутри государства."
  great_dictator_focus:0 "Великий диктатор"
  great_dictator_focus_desc:0 "Легитимность [ROOT.GetNeutralLeader] исходит не от бога и не от народа, а от умения пользоваться властью. Его уважают — и боятся."
  cult_personality_focus:0 "Решительная дипломатия"
  cult_personality_focus_desc:0 "Именно личный стиль руководства нашего лидера и его кабинета определяет дипломатию страны."
  cult_personality_totalitarian:0 "Культ личности"
  cult_personality_totalitarian_desc:0 "Культ личности необходим для сохранения государства. [ROOT.GetNeutralLeader] — легендарная фигура, очаровывающая всех, кто с ним встречается."
  puppetmaster_focus:0 "Кукловод"
  puppetmaster_focus_desc:0 "[ROOT.GetNeutralLeader] предпочитает оставаться в тени, используя таинственность и неопределённость для сохранения власти. Если народ недоволен режимом, он винит марионеток, а не хозяина."
  machiavelli_focus:0 "Макиавеллизм"
  machiavelli_focus_desc:0 "Гораздо безопаснее внушать страх, чем любовь, ведь любовь держится на обязательстве, которое люди нарушают ради собственной выгоды; страх же поддерживается угрозой наказания, которая не подводит. Все видят, каким ты кажешься, но лишь немногие знают, каков ты на самом деле."
  despot_focus:0 "Коронация [ROOT.GetNeutralLeader]"
  despot_focus_desc:0 "[ROOT.GetNeutralLeader] — легендарная фигура, опирающаяся на божественное право или священную легитимность. Он стоит выше простых людей."
  honour_guard_focus:0 "Почётная гвардия"
  honour_guard_focus_desc:0 "При дворе [ROOT.GetNeutralLeader] окружён элитной стражей. Иногда она выступает и за пределы дворца, исполняя волю правителя."
  pro_communist_focus:0 "Сближение с коммунистами"
  pro_communist_focus_desc:0 "[ROOT.GetNeutralLeader] считает, что именно коммунисты определят ход следующего полувека. Мы должны сблизиться с ними, если хотим преуспеть."
  pro_fascist_focus:0 "Сближение с фашистами"
  pro_fascist_focus_desc:0 "[ROOT.GetNeutralLeader] считает, что именно фашисты определят ход следующего полувека. Мы должны сблизиться с ними, если хотим преуспеть."
  power_authority_focus:0 "Сила власти"
  power_authority_focus_desc:0 "Именно диктаторская власть сближает нас с идеологическими тоталитарными режимами. Власть — это сила, и наши союзники укрепляют наш авторитет."
  flexible_warmongering_focus:0 "Гибкое разжигание войны"
  flexible_warmongering_focus_desc:0 "Пока красные и коричневые армии идут на войну, мир пребывает в таком хаосе, что никто не заметит и наших территориальных приобретений..."
  the_state_is_me_focus:0 "Гегемония [ROOT.GetNeutralLeader]"
  the_state_is_me_focus_desc:0 "Чтобы пройти через эти бурные времена, нужен по-настоящему дальновидный лидер. [ROOT.GetNeutralLeader] не подвёл нас, и наши народы будут вечно благодарны!"
  pro_democratic_focus:0 "Сближение с демократами"
  pro_democratic_focus_desc:0 "[ROOT.GetNeutralLeader] считает, что именно демократы определят ход следующего полувека. Мы должны сблизиться с ними, если хотим преуспеть."
  aid_the_cause_focus:0 "Помочь правому делу"
  aid_the_cause_focus_desc:0 "Мы понимаем, что тоталитарные режимы являются главной угрозой нашей стране. Мы должны помочь демократам в борьбе против них!"
  relative_leniency_focus:0 "Демократическая легитимность"
  relative_leniency_focus_desc:0 "Хотя мы сами не являемся демократией, нас поддерживают демократические государства. Мы можем пользоваться их легитимностью, а они иногда будут закрывать глаза на наши действия."
  proud_not_conform_focus:0 "Гордость непохожести"
  proud_not_conform_focus_desc:0 "Мы не подчиняемся стереотипам. В этом наша истинная сила."
  industry_provisions:0 "Промышленные меры"
  industry_provisions_desc:0 "Промышленные меры необходимы, чтобы запустить нашу экономику."
  agricultural_provisions:0 "Аграрные меры"
  agricultural_provisions_desc:0 "Сельское хозяйство жизненно важно для нашей экономики, поэтому его необходимо защитить."
  industrial_primacy:0 "Урбанизация"
  industrial_primacy_desc:0 "В современном мире первенство принадлежит городским и промышленным секторам. Мы не можем позволить себе их игнорировать."
  agricultural_primacy:0 "Сельский уклад"
  agricultural_primacy_desc:0 "Нельзя позволять современным новинкам отвлекать нас от основ общества. Сельское хозяйство было и останется нашим главным интересом."
  industrial_grants:0 "Субсидии ВПО"
  industrial_grants_desc:0 "Именно наши военно-промышленные организации вынесут на себе тяжесть военных усилий."
  mining_grants:0 "Субсидии горнодобывающей отрасли"
  agriculture_grants_desc:0 "Нам не хватает ресурсов для производства снаряжения. Развитие добычи исправит эту проблему."
  public_schools:0 "Государственные школы"
  public_schools_desc:0 "Вложения в государственное образование жизненно важны для возрождения нашей исследовательской сферы."
  extra_tech_slot_3:0 "Совместные научные разработки"
  extra_tech_slot_3_desc:0 "Обмениваясь технологическими достижениями с союзниками, вся наша фракция сможет эффективнее вести военные исследования."
  involve_spain_civil_war:0 "Участие в гражданской войне в Испании"
  involve_spain_civil_war_desc:0 "Гражданская война в Испании уже считается предвестником более масштабного конфликта. Мы должны вмешаться — ради науки или идеологии."
  generic_secret_weapons:0 "Секретное оружие"
  generic_secret_weapons_desc:0 "Соблазнительно вложить все ресурсы в танки и самолёты, но секрет победы лежит в новых областях науки: электронике, ракетостроении и ядерных исследованиях."
  generic_army_effort:0 "Развитие армии"
  generic_army_effort_desc:0 "Несмотря на растущие возможности авиации и флота, сухопутные сражения останутся ключом к войнам будущего. Подготовившись, мы избежим повторения кошмара окопов."
  generic_equipment_effort:0 "Развитие снаряжения"
  generic_equipment_effort_desc:0 "Пределы того, что может нести пехотинец, постоянно расширяются. Мы сосредоточимся на обеспечении войск лучшими доступными средствами."
  generic_motorization_effort:0 "Развитие моторизации"
  generic_motorization_effort_desc:0 "Мобильность и защита крайне важны для безопасного ввода и вывода пехоты с поля боя. Эти разработки позволят нам действовать быстрее."
  generic_doctrine_effort:0 "Развитие доктрины"
  generic_doctrine_effort_desc:0 "Военные доктрины Великой войны устарели. Мы должны поручить лучшим умам формирование военной мысли завтрашнего дня."
  generic_equipment_effort_2:0 "Разработка снаряжения"
  generic_equipment_effort_2_desc:0 "Мы продолжим усилия, чтобы наша пехота и части поддержки были вооружены лучшим снаряжением своего времени."
  generic_mechanization_effort:0 "Развитие механизации"
  generic_mechanization_effort_desc:0 "Переосмыслив возможности моторизованной пехоты, мы сможем раздвинуть пределы современного транспортного машиностроения."
  generic_doctrine_effort_2:0 "Совершенствование армейской доктрины"
  generic_doctrine_effort_2_desc:0 "Поле боя изменилось не только за межвоенные годы, но и в ходе недавних конфликтов. Мы должны постоянно пересматривать наши доктрины."
  generic_equipment_effort_3:0 "Улучшение снаряжения"
  generic_equipment_effort_3_desc:0 "Вместо копирования или закупки иностранного вооружения мы должны стремиться стать мировым лидером в области пехотного оружия."
  generic_armor_effort:0 "Развитие бронетехники"
  generic_armor_effort_desc:0 "Используя опыт механизации пехоты, мы сможем улучшить и нашу бронетехнику."
  generic_special_forces:0 "Войска специального назначения"
  generic_special_forces_desc:0 "Нам нужны элитные части; приоритет следует отдать горным стрелкам и десантникам."
  generic_aviation_effort:0 "Развитие авиации"
  generic_aviation_effort_tt:0 "Недостаточно ячеек строительства для §Yавиабазы§!"
  generic_aviation_effort_desc:0 "Нигде технический прогресс не идёт так быстро, как в воздушной войне. Авиация — область, которой должна овладеть любая современная держава."
  generic_fighter_focus:0 "Ставка на истребители"
  generic_fighter_focus_desc:0 "Воздушные дуэли Великой войны ещё не стали прошлым. Опережающее развитие истребителей даст нам преимущество в будущем."
  generic_bomber_focus:0 "Ставка на бомбардировщики"
  generic_bomber_focus_desc:0 "Когда люди будущего будут говорить об ужасах современных войн, они вспомнят огонь, падающий с неба. Мы сделаем всё, чтобы эти рассказы рассказывали наши враги."
  generic_aviation_effort_2:0 "Дальнейшее развитие авиации"
  generic_aviation_effort_2_desc:0 "Новые достижения в авиации необходимы, чтобы лучше интегрировать ВВС с другими родами войск."
  generic_CAS_effort:0 "Развитие штурмовой авиации"
  generic_CAS_effort_desc:0 "Современная армия нуждается в поддержке не только на земле, но и с воздуха."
  generic_rocket_effort:0 "Ракетостроение"
  generic_rocket_effort_desc:0 "Ракетные и реактивные двигатели обеспечивают невиданные скорости для беспилотных и пилотируемых аппаратов. Освоив эти технологии, мы застанем врага врасплох."
  generic_NAV_effort:0 "Развитие морской авиации"
  generic_NAV_effort_desc:0 "Как новая морская война частично ведётся под водой, так и часть её ведётся в воздухе над морями."
  generic_naval_effort:0 "Развитие флота"
  generic_naval_effort_tt:0 "Недостаточно ячеек строительства для §Yверфей§!"
  generic_naval_effort_desc:0 "Расширение флота должно стать нашим главным приоритетом. Направим все доступные ресурсы на новые верфи и исследования лёгких надводных кораблей."
  generic_flexible_navy:0 "Гибкий флот"
  generic_flexible_navy_desc:0 "Переосмысление морской войны с учётом развития подводных лодок позволит нам эффективно бить по вражеским конвоям."
  generic_large_navy:0 "Крупный флот"
  generic_large_navy_desc:0 "Адаптация морских доктрин к крупным кораблям и защите торговых конвоев поможет понять, какие суда нам нужны."
  generic_submarine_effort:0 "Развитие подводных лодок"
  generic_submarine_effort_desc:0 "Подводная война — самое захватывающее развитие флота со времён изобретения торпедного катера. Мы должны не только защищаться от субмарин, но и использовать их против вражеского судоходства."
  generic_cruiser_effort:0 "Развитие крейсеров"
  generic_cruiser_effort_desc:0 "Прежде чем переходить к исследованиям современных линкоров, необходимо заменить устаревшие малые крейсеры."
  generic_destroyer_effort:0 "Развитие эсминцев"
  generic_destroyer_effort_desc:0 "Изучая устройство и стратегическое применение подводных лодок, мы также поняли, как им противостоять. Эсминцы будут играть в этом ключевую роль."
  generic_capital_ships_effort:0 "Развитие крупных кораблей"
  generic_capital_ships_effort_desc:0 "Держава с наибольшим числом линкоров будет править океанами. Линкоры и авианосцы представляют старое и новое лицо морского превосходства."
  generic_industrial_effort:0 "Развитие промышленности"
  generic_industrial_effort_desc:0 "Сосредоточим все политические усилия на великом рывке в развитии гражданской промышленности."
  generic_industrial_effort_2:0 "Развитие промышленности II"
  generic_industrial_effort_2_desc:0 "Железная воля и неустанный труд позволят нам мобилизовать народ для нового промышленного рывка."
  generic_construction_effort:0 "Развитие строительства"
  generic_construction_effort_tt:0 "Недостаточно ячеек строительства для §Yгражданских фабрик§!"
  generic_construction_effort_desc:0 "Гражданский промышленный потенциал нельзя недооценивать даже тогда, когда над миром сгущаются тучи войны."
  generic_production_effort:0 "Развитие вооружений"
  generic_production_effort_tt:0 "Недостаточно ячеек строительства для §Yвоенного завода§!"
  generic_production_effort_desc:0 "Если можно строить тракторы, можно строить и танки! Мы не должны позволить военному производству отстать."
  generic_construction_effort_2:0 "Промышленное развитие"
  generic_construction_effort_2_desc:0 "Дальнейшее расширение фабрик ускорит производство товаров для торговли и новых строительных проектов."
  generic_production_effort_2:0 "Развитие военной промышленности"
  generic_production_effort_2_desc:0 "Переделывать гражданские фабрики под военное производство неэффективно. Нужно заранее готовить военную промышленность."
  generic_production_effort_3:0 "Расширение военной промышленности"
  generic_production_effort_3_desc:0 "Необходимо продолжать расширять военные заводы, чтобы удовлетворить спрос на новое снаряжение."
  generic_infrastructure_effort:0 "Совершенствование инфраструктуры"
  generic_infrastructure_effort_desc:0 "Страна без надлежащей инфраструктуры не сможет вести сложные проекты и строительство."
  generic_infrastructure_effort_tt:0 "Недостаточно ячеек строительства для §Yинфраструктуры§!"
  generic_synth_oil_effort_tt:0 "Недостаточно ячеек строительства для §Yсинтетического НПЗ§!"
  generic_infrastructure_effort_2:0 "Развитие инфраструктуры"
  generic_infrastructure_effort_2_desc:0 "Дальнейшее развитие инфраструктуры обеспечит транспорт и связь, необходимые для высокотехнологичных тайных проектов."
  generic_construction_effort_3:0 "Промышленное расширение"
  generic_construction_effort_3_desc:0 "Расширение инфраструктурной сети значительно повысило наши строительные возможности."
  generic_nuclear_effort:0 "Ядерные разработки"
  generic_nuclear_effort_desc:0 "Стоя на пороге открытия, способного изменить мир, мы не можем позволить другим зажечь огонь, который однажды может поглотить Землю."
  generic_extra_tech_slot:0 "Дополнительные исследования"
  generic_extra_tech_slot_desc:0 "Промышленное расширение и другие недавние достижения позволят нам вести больше исследований одновременно."
  generic_extra_tech_slot_2:0 "Дальнейшее расширение исследований"
  generic_extra_tech_slot_2_desc:0 "Быстрая индустриализация страны открыла новые возможности для исследований и разработок."
  generic_support_effort:0 "Инвестиции в роты поддержки"
  generic_support_effort_desc:0 "Роты поддержки играют важную роль в пехотной войне. Мы должны увеличить вложения в эти направления."
  generic_army_college:0 "Военная академия"
  generic_army_college_desc:0 "Наш офицерский корпус, к сожалению, оставляет желать лучшего. Расширение финансирования и полномочий военной академии повысит уровень командиров."
  generic_technical_college:0 "Армейское техническое училище"
  generic_technical_college_desc:0 "Навыки и методы наших армейских специалистов всегда можно улучшить."
  generic_grand_bombard:0 "Ставка на пехотное снаряжение"
  generic_grand_bombard_desc:0 "Неважно, если наши солдаты обучены не лучше всех: наше оружие настолько эффективно, что с ним победит любой."
  generic_professional_army:0 "Ставка на подготовку"
  generic_professional_army_desc:0 "Именно мастерство солдат и командиров определяет силу нашей армии."
  generic_field_medicine:0 "Ставка на полевую медицину"
  generic_field_medicine_desc:0 "Наши людские ресурсы ограничены, поэтому мы должны вложиться в медицину, чтобы снизить потери."
  generic_grand_tanks:0 "Ставка на бронетехнику"
  generic_grand_tanks_desc:0 "Это может показаться амбициозным, но крупные бронетанковые силы дадут нам преимущество над соперниками."
  army_primacy:0 "Первенство армии"
  army_primacy_desc:0 "Среди трёх родов войск именно армия жизненно важна для нашего успеха."
  air_primacy:0 "Первенство авиации"
  air_primacy_desc:0 "Среди трёх родов войск именно военно-воздушные силы жизненно важны для нашего успеха."
  navy_primacy:0 "Первенство флота"
  navy_primacy_desc:0 "Среди трёх родов войск именно флот жизненно важен для нашего успеха."
  air_research_focus:0 "Авиационные конструкторские бюро"
  air_research_focus_desc:0 "Мы сосредоточим усилия прежде всего на проектировании самолётов."
  generic_air_doctrine_2:0 "Развитие воздушной доктрины"
  generic_air_doctrine_2_desc:0 "Крайне важно, чтобы наша воздушная доктрина была как можно современнее."
  generic_scouting_planes:0 "Воздушная разведка"
  generic_scouting_planes_desc:0 "Разведка с воздуха обеспечит нам наибольшие шансы на успех."
  generic_additional_bits_air:0 "Улучшение авиационных компонентов"
  generic_additional_bits_air_desc:0 "Передовые компоненты самолётов дадут нам преимущество в небе."
  generic_air_training_school:0 "Улучшение подготовки ВВС"
  generic_air_training_school_desc:0 "Авиация — самый молодой род войск, поэтому мы должны обеспечить максимальную подготовку всех пилотов."
  generic_radar_focus:0 "Развитие РЛС"
  generic_radar_focus_desc:0 "РЛС — новая разработка с множеством военных применений. Мы должны вложиться в неё."
  navy_research_focus:0 "Морские конструкторские бюро"
  navy_research_focus_desc:0 "Мы сосредоточим усилия прежде всего на проектировании кораблей."
  expand_dockyards_focus:0 "Расширение верфей"
  expand_dockyards_focus_desc:0 "Нам нужны новые верфи, если мы хотим иметь заметное присутствие на море."
  generic_navy_doctrine_2:0 "Развитие морской доктрины"
  generic_navy_doctrine_2_desc:0 "Крайне важно, чтобы наша морская доктрина была как можно более современной."
  generic_additional_research_carriers:0 "Расширение возможностей флота"
  generic_additional_research_carriers_desc:0 "Наши морские возможности ограничены из-за отсталости кораблей. Создание более разнообразного флота расширит наше присутствие и потенциал."
  generic_naval_invasion:0 "Десантно-штурмовые части"
  generic_naval_invasion_desc:0 "Контролировать моря — это хорошо, но мы должны использовать это преимущество через тщательно подготовленные морские вторжения."
  generic_naval_bits:0 "Улучшение корабельных компонентов"
  generic_naval_bits_desc:0 "Мы должны сделать все элементы наших кораблей как можно более современными."
  church_destroyed_fascist_focus:0 "Фашистский атеизм"
  church_destroyed_fascist_focus_desc:0 "Религии нет места в нашей стране; если народ и должен чему-то поклоняться, то только государству."
  traditional_fascism_focus:0 "Национализм и традиции"
  traditional_fascism_focus_desc:0 "Только обращаясь к прошлому и принимая нашу славную историю и традиции, мы достигнем истинного величия."
  fascist_education:0 "Фашистское воспитание"
  fascist_education_desc:0 "Крайне важно, чтобы весь народ был полностью проникнут государственными убеждениями."
  invite_foreign_communists:0 "Пригласить иностранных коммунистов"
  invite_foreign_communists_desc:0 "Коммунизм подавляется по всему миру. Мы всегда найдём угнетённых интеллектуалов и бойцов, готовых присоединиться к нашему делу."
  internal_policing:0 "Преследование внутренних врагов"
  internal_policing_desc:0 "Враги государства всегда скрываются внутри наших границ. Пришло время покончить с ними."
  state_corring_communism:0 "Принудительная интеграция"
  state_corring_communism_desc:0 "Благодаря беспощадной индустриализации и коллективистской политике мы обеспечим объединение всех народов под знаменем нашей страны."
  fascist_alliance:0 "Прагматичные союзы"
  fascist_alliance_desc:0 "Чтобы закрепить наши завоевания, нам нужны союзники. Хотя бы на время..."
  fascist_coring:0 "Территориальное присвоение"
  fascist_coring_desc:0 "Именно наш народ является высшим. Земли должны быть очищены, чтобы освободить для него место..."
  aggressive_warmongering:0 "Агрессивное разжигание войны"
  aggressive_warmongering_desc:0 "Если мы хотим стать нацией, которую боятся, мы должны завоёвывать быстро и безнаказанно."
  revolutionary_socialism:0 "Поглощение рабочих движений"
  revolutionary_socialism_desc:0 "Рабочие движения играют важную роль в коммунистическом обществе, но они должны понять: прежде всего они подчиняются государству."
  revolutionary_socialism_2:0 "Присвоение богатств"
  revolutionary_socialism_2_desc:0 "Капиталистам и аристократам в нашем обществе нельзя позволять копить богатства. Они должны внести вклад в общественное равенство!"
  military_state_focus:0 "Армия служит государству"
  military_state_focus_desc:0 "Армия — жизненно важный орган фашистского государства, но генералы должны понимать, что они являются агентами режима и обязаны ему служить."
  glory_war_focus:0 "Слава через войну"
  glory_war_focus_desc:0 "Война и завоевания — единственный путь к нашим территориальным целям. Мы обретём славу на поле боя!"
  pillage_tactics_focus:0 "Разграбление чужих богатств"
  pillage_tactics_focus_desc:0 "Пусть демократические страны с их свободными рынками богаче нас — мы всегда можем просто забрать их богатства после завоевания."
  founding_fascist_empire:0 "Основания империи"
  founding_fascist_empire_desc:0 "Пусть сейчас мы небольшая страна, но у нас великие амбиции... имперские амбиции!"
  enter_global_sphere_focus:0 "Вступление в демократическую сферу"
  enter_global_sphere_focus_desc:0 "Как демократическая страна, мы можем рассчитывать на определённые выгоды от наших эгалитарных единомышленников."
  allied_investment_focus:0 "Инвестиции союзников"
  allied_investment_focus_desc:0 "Союзники богаты и великодушны. Их предприниматели охотно вложатся в нашу молодую страну."
  arms_dealing_focus_2:0 "Наращивание производства оружия"
  arms_dealing_focus_2_desc:0 "Мы не можем позволить себе быть неподготовленными. Производство оружия должно работать с максимальной эффективностью."
  army_serves_civilians_focus:0 "Армия под гражданским командованием"
  army_serves_civilians_focus_desc:0 "Нашу страну возглавляют гражданские институты, и армия безусловно признаёт их легитимность."
  understand_little_focus:0 "Понять неприсоединившихся"
  understand_little_focus_desc:0 "Будучи неприсоединившимися, мы знаем, каково это — дрейфовать в мире глобальной политики. Мы можем влиять на них так, как не могут другие демократии."
  foreign_investment:0 "Иностранные пожертвования"
  foreign_investment_desc:0 "Наша приверженность правилам международного порядка делает нас привлекательной возможностью для иностранных деловых магнатов."
  ideological_democracy_focus_2:0 "Завершить переход"
  ideological_democracy_focus_2_desc:0 "Наконец у нас есть средства провести свободные и честные выборы. Да здравствует демократия!"
  ideological_democracy_focus_3:0 "Сбалансированные институты"
  ideological_democracy_focus_3_desc:0 "Благодаря нашему умеренному прошлому институты остаются беспристрастными, сбалансированными и эффективными."
  moderate_carefulness:0 "Осмотрительная дипломатия"
  moderate_carefulness_desc:0 "Только осторожная дипломатия позволит нам пройти через эти тяжёлые времена."
  elite_support_focus:0 "Поддержка элит"
  elite_support_focus_desc:0 "Старые аристократы и традиционные лидеры удерживают режим у власти. Режим служит элитам, а элиты служат режиму."
  elite_support_focus_2:0 "Благородный режим"
  elite_support_focus_2_desc:0 "Дворянство правит страной через олигархическую коалицию, осторожно распределяя власть внутри государства."
  militia_support_focus:0 "Поддержка ополчения"
  militia_support_focus_desc:0 "Наш режим использует частное ополчение, верное партии, чтобы держать остальную страну в повиновении."
  militia_support_focus_2:0 "Устрашители режима"
  militia_support_focus_2_desc:0 "Пусть это и выглядит грубо, но иногда наши ополченцы должны встряхнуть население и вернуть его к порядку."
  cities_militia_institutions:0 "Патрулирование улиц"
  cities_militia_institutions_desc:0 "Наша опора — города, и мы должны обеспечить в них порядок и контроль."
  urban_control_focus:0 "Контроль городов"
  urban_control_focus_desc:0 "Наши ополчения сосредоточены в городах и при необходимости выступают в сельскую местность."
  agricultural_support_focus:0 "Поддержка аграриев"
  agricultural_support_focus_desc:0 "Богатые землевладельцы финансируют значительную часть нашего режима — мы должны удержать их на своей стороне."
  agricultural_support_focus_2:0 "Зерновые бароны"
  agricultural_support_focus_2_desc:0 "Богатые сельские землевладельцы, производящие ценные и необходимые культуры, приносят пользу и нации, и партии."
  rural_support:0 "Сельская опора власти"
  rural_support_desc:0 "Наша власть основана на влиянии партии в сельских городках и деревнях. Мы должны сосредоточить там силы, чтобы держать города под контролем."
  industrial_support_focus:0 "Поддержка промышленников"
  industrial_support_focus_desc:0 "Промышленники и деловые магнаты поддерживают режим на плаву, поэтому они имеют определённое влияние на политику."
  industrial_support_focus_2:0 "Бастионы промышленности"
  industrial_support_focus_2_desc:0 "Мы превратим крупные городские районы в мощные производственные центры, что лишь усилит богатство и влияние наших спонсоров."
  industrial_support_focus_3:0 "Корпоративный союз"
  industrial_support_focus_3_desc:0 "Крупные корпорации нашей страны заключат союз с государством и партией. Вместе мы будем господствовать над нацией!"
  institutional_support_focus:0 "Поддержка институтов"
  institutional_support_focus_desc:0 "Наш режим укреплён строгими институтами и укоренившимися партийными чиновниками во всех сферах общества. Хотя наша партия ещё не вполне тоталитарна, её влияние превосходит влияние иных авторитарных режимов."
  institutional_support_focus_2:0 "Бюрократические махинации"
  institutional_support_focus_2_desc:0 "Контроль над законами и ключевыми институтами позволяет режиму всегда выходить победителем."
  entrench_power_support:0 "Власть сверху"
  entrench_power_support_desc:0 "Нашей страной правит группа теневых фигур, дёргающих за ниточки из мрачных кабинетов государственных учреждений."
  party_over_religion:0 "Аристократия выше веры"
  party_over_religion_desc:0 "Именно аристократия является истинной правящей силой нашей страны, а духовенство склоняется перед её решением."
  religious_authority:0 "Власть от религии"
  religious_authority_desc:0 "Скорее благородное духовенство и религиозные деятели господствуют в этой стране, а аристократия в итоге подчиняется им."
  strike_out_focus:0 "Собственный путь"
  strike_out_focus_desc:0 "Мы не можем позволить международным условностям застать нас врасплох. Мы проложим собственный путь в мире."
  play_by_rules_focus:0 "Игра по международным правилам"
  play_by_rules_focus_desc:0 "Именно международные правила не дадут нам оказаться в изоляции или стать добычей великих держав."
  seduce_major_powers_focus:0 "Соблазнить великие державы"
  seduce_major_powers_focus_desc:0 "Великие державы всегда стремятся расширить своё влияние. Почему бы не привлечь их внимание — и тщательно проследить, чтобы это не повлекло обязательств?"
  lead_minor_powers_focus:0 "Возглавить малые страны"
  lead_minor_powers_focus_desc:0 "Малые страны — наши естественные союзники в войне великих империй и государств. Поодиночке мы слабы, вместе — сильны."
  grand_expeditions_focus:0 "Отправка экспедиций"
  grand_expeditions_focus_desc:0 "Чтобы обеспечить дружеское расположение других стран, мы должны быть готовы вмешиваться в их конфликты, когда это нам выгодно."
  military_conclave_focus:0 "Создание военных конклавов"
  military_conclave_focus_desc:0 "Военные конклавы обеспечат нас столь необходимыми знаниями в области ведения войны."
  attack_major_powers_focus:0 "Бросить вызов великим державам"
  attack_major_powers_focus_desc:0 "Великие державы — истинные враги нашего режима. Если они нам угрожают, мы ответим всей доступной силой!"
  diplomatic_corps_focus:0 "Создание дипломатического корпуса"
  diplomatic_corps_focus_desc:0 "Дипломатический корпус не позволит нам оказаться в полной изоляции в мире идеологического конфликта."
  trade_power_focus:0 "Сила через торговлю"
  trade_power_focus_desc:0 "Торговля поможет нам удерживать другие страны на своей стороне."
  appease_major_powers_focus:0 "Умиротворение великих держав"
  appease_major_powers_focus_desc:0 "Великие державы легко умиротворить. Предоставив им некоторое влияние на наши дела в обмен на гарантии, мы обеспечим безопасность и стабильность."
  grand_alliances:0 "Великие союзы"
  grand_alliances_desc:0 "Только вступив в большие коалиции государств, мы сможем пережить бурю войны."
  nationalism_supreme:0 "Национальное превосходство"
  nationalism_supreme_desc:0 "Наша нация поистине превосходит всех. Они преклонятся перед нами!"
  fascist_empire_complete:0 "Укрепление империи"
  fascist_empire_complete_desc:0 "Империя создана, и теперь мы можем провозгласить нашу законную славу!"
  being_a_puppet:0 "Утрата независимости"
  being_a_puppet_desc:0 "Мы побеждены, но не сломлены. Мы переживём эти испытания."
  cooperation_puppet:0 "Сотрудничество"
  cooperation_puppet_desc:0 "Если мы будем верными подданными и докажем свою ценность, то сможем мирно решить вопрос автономии."
  cooperation_puppet_1:0 "Выгодная торговля"
  cooperation_puppet_1_desc:0 "Мы вполне можем извлечь максимум пользы из торговли со старшим партнёром."
  cooperation_puppet_2:0 "Импорт от хозяина"
  cooperation_puppet_2_desc:0 "Наш хозяин охотно предоставит нам импорт, который поможет укрепить экономику."
  cooperation_puppet_3:0 "Разрешённая автономия"
  cooperation_puppet_3_desc:0 "Если мы уважительно попросим автономии у нашего хозяина, нам могут предоставить гораздо большую свободу в определении собственной судьбы."
  uncooperation_puppet:0 "Сопротивление"
  uncooperation_puppet_desc:0 "Мы не можем принять нынешнее положение. Мы будем сопротивляться нашим повелителям."
  uncooperation_puppet_1:0 "Вооружить сопротивление"
  uncooperation_puppet_1_desc:0 "Сопротивление должно быть вооружено, если мы хотим сбросить ярмо империализма."
  uncooperation_puppet_2:0 "Пропаганда независимости"
  uncooperation_puppet_2_desc:0 "Наш народ должен поверить, что мы заслуживаем самоопределения любой ценой."
  uncooperation_puppet_3:0 "Подготовка к борьбе с сюзереном"
  uncooperation_puppet_3_desc:0 "Наше восстание не будет лёгким, и мы все должны быть готовы к великим лишениям ради свободы."
  pure_cooperation:0 "Первые среди слуг"
  pure_cooperation_desc:0 "Только будучи превосходными слугами, мы получаем от хозяина такую автономию."
  violent_liberation:0 "Освобождение!"
  violent_liberation_desc:0 "Время пришло! Свобода!"
  Siam1:0 "Союз с Японией"
  Siam1_desc:0 "Япония — восходящая держава Востока. Союз с ней обеспечит нашу безопасность."
  Siam2:0 "Расширение наших границ"
  Siam2_desc:0 "Есть территории, которые по праву принадлежат нам. Мы должны вернуть их!"
  Siam3:0 "Углубить зависимость от Японии"
  Siam3_desc:0 "Союз с Японией принёс нам множество выгод. Мы должны ещё сильнее укрепить эти связи. Даже если это будет стоить таких мелочей, как суверенитет."
  Siam4:0 "Кто сиамец? Ты сиамец!"